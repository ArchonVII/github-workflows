# Caller workflow for the single required branch-protection gate.
# Branch protection should require only: repo-required-gate / decision
# Do not add path filters to this caller.

name: Repo Required Gate

on:
  pull_request:
    branches: [main]
    types:
      [
        opened,
        edited,
        synchronize,
        reopened,
        ready_for_review,
        labeled,
        unlabeled,
      ]
  merge_group:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: repo-required-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # -------------------------------------------------------------------------
  # Pick ONE of the call shapes below for your consumer's CI. Comment the
  # others. The gate auto-routes PRs to the smallest lane that still gives
  # real signal: docs-only / workflow-only / policy-only / snapshot-refresh /
  # code (node|python|go|polyglot) / forced-full (via the `ci:full` label).
  # -------------------------------------------------------------------------
  repo-required-gate:
    uses: ArchonVII/github-workflows/.github/workflows/repo-required-gate.yml@v1
    with:
      # ------ Minimal (docs / config repos with no language CI) -----------
      stack: minimal

      # ------ Node-only stack ---------------------------------------------
      # stack: node
      # node-versions: '["22"]'
      # npm-test-script: test
      # npm-build-script: build

      # ------ Python-only stack -------------------------------------------
      # stack: python
      # python-versions: '["3.12"]'
      # python-use-uv: true

      # ------ Go-only stack -----------------------------------------------
      # Discovers every tracked go.mod and runs build/vet/test per module.
      # stack: go
      # go-versions: '["stable"]'
      # go-cgo-enabled: "1"              # set if your build needs cgo
      # go-exclude-modules: |            # skip example/demo modules
      #   examples/

      # ------ Polyglot (Node + Python + Go in one repo) -------------------
      # When stack=polyglot, you MUST declare at least one of node-paths,
      # python-paths, or go-paths. Files match `path/**` (prefix), `path/`
      # (prefix), or exact filename. Each language CI runs only when one of
      # its own paths changed.
      #
      # stack: polyglot
      # node-versions: '["22"]'
      # python-versions: '["3.12"]'
      # node-paths: |
      #   server/**
      #   web/**
      #   electron/**
      #   package.json
      #   package-lock.json
      # python-paths: |
      #   analysis-service/**
      # go-paths: |
      #   cmd/**
      #   pkg/**
      #   go.mod
      #   go.sum

      # ------ Node + Go polyglot (e.g. an Electron + Go-backend app) ------
      # stack: polyglot
      # node-versions: '["22"]'
      # npm-typecheck-script: typecheck
      # node-paths: |
      #   frontend/**
      #   emain/**
      #   package.json
      #   package-lock.json
      # go-paths: |
      #   cmd/**
      #   pkg/**
      #   go.mod
      #   go.sum
      #   tsunami/**
      # go-exclude-modules: |
      #   tsunami/demo/
      # go-generate-command: task generate   # optional: regen Go→TS bindings
      # go-verify-generated: true            # fail if generated output drifts

      # ------ Snapshot-refresh lane (any stack) ---------------------------
      # PRs that touch ONLY paths matching snapshot-paths skip language CI
      # and instead run snapshot-test-command. ALL changed files must match
      # (one non-matching file falls through to the normal lane).
      #
      # snapshot-paths: |
      #   src/snapshots/
      # snapshot-test-command: npm run test:snapshots

      # ------ Force-full escape hatch (any stack) -------------------------
      # Default label is `ci:full`. Apply it to a PR to bypass path-based
      # routing and run the full language CI surface — e.g. a workflow-only
      # change that semantically affects CI.
      #
      # force-full-ci-label: ci:full
