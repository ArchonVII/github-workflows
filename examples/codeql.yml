# Copy to `.github/workflows/codeql.yml`. Pick languages for your repo.

name: CodeQL

on:
  schedule:
    # Weekly Sunday 06:00 UTC re-scan even when no PRs land.
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: ArchonVII/github-workflows/.github/workflows/codeql.yml@v1
    with:
      # JSON array — valid: actions, c-cpp, csharp, go, java-kotlin,
      # javascript-typescript, python, ruby, rust, swift.
      languages: '["javascript-typescript"]'
      queries: 'security-and-quality'
