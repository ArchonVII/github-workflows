# Copy to `.github/workflows/auto-merge-dependabot.yml`. Pairs with a
# `.github/dependabot.yml` in your repo that schedules the updates.
#
# Important: branch protection on `main` must include the relevant required
# status checks. Otherwise auto-merge fires before CI finishes.

name: Auto-merge Dependabot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    uses: ArchonVII/github-workflows/.github/workflows/auto-merge-dependabot.yml@v1
    # with:
    #   allowed-update-types: |
    #     version-update:semver-patch
    #     version-update:semver-minor
