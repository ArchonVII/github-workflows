# Copy to `.github/workflows/ci.yml`. Assumes package.json has `lint`,
# `typecheck`, and `test` scripts. Pass empty strings to skip any of them.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  ci:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ArchonVII/github-workflows/.github/workflows/node-ci.yml@v1
    with:
      node-versions: '["22"]'
      # os-matrix: '["ubuntu-latest","windows-latest"]'
      # lint-script: 'lint'
      # typecheck-script: 'typecheck'
      # test-script: 'test'
      # build-script: ''
