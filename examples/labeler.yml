name: Labeler

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  paused:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Automatic Labeler is paused to reduce GitHub Actions usage."
