name: Repo Update Log Fragment

on:
  pull_request:
    types: [opened, synchronize, edited, reopened, ready_for_review]

permissions:
  pull-requests: read
  contents: read

jobs:
  check:
    uses: ArchonVII/github-workflows/.github/workflows/repo-update-log-fragment.yml@v1
    with:
      workflow-library-ref: v1
