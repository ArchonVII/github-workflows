# Copy this file to `.github/workflows/pr-policy.yml` in any consumer repo.
# The thin caller owns the pull_request trigger; the reusable workflow holds
# all the logic. Pin to a tag (e.g. @v1) so a breaking change upstream does
# not silently re-deploy here.

name: PR Policy

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

# `permissions:` here scopes the GITHUB_TOKEN passed into the reusable
# workflow. The reusable workflow itself sets a stricter job-level block,
# but a reusable workflow can never grant itself MORE than the caller
# grants — so every scope the reusable workflow needs must also be
# present here:
#   - pull-requests: read   → read PR body / files / draft state
#   - contents: read        → checkout + `git.getCommit` for head commit time
#   - checks: read          → required by the F2/F10 evidence parser to look
#                             up CI check-runs for `location: ci` evidence
#                             rows via `checks.listForRef`. Source: PR #19
#                             adversarial review (2026-05-20), finding C2.
permissions:
  pull-requests: read
  contents: read
  checks: read

jobs:
  policy:
    uses: ArchonVII/github-workflows/.github/workflows/pr-policy.yml@v1
    # All inputs are optional; the defaults enforce the standard PR contract.
    # with:
    #   require-linked-issue: true
    #   require-verification-section: true
    #   require-checked-box: true
    #   run-actionlint: true
    #   # Warning-only by default. Set true to hard-fail agent-managed PRs
    #   # touching protected paths unless an independent approval or
    #   # non-author `Release-Admiral: @name` marker is present.
    #   enforce-role-separation: false
    #   # Override only if this repo's protected agent-policy surface differs
    #   # from the default .github/.githooks/.agent/authority/code/script set.
    #   role-protected-paths: |
    #     .github/**
    #     .githooks/**
    #     .agent/**
    #     AGENTS.md
    #     CLAUDE.md
    #     GEMINI.md
    #     package.json
    #     package-lock.json
    #     src/**
    #     scripts/**
