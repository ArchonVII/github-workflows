name: PR Body Auto-Inject (reusable)

# Bot-authored PRs (Copilot SWE agent, GitHub Apps) freehand their bodies and
# do not read .github/PULL_REQUEST_TEMPLATE.md, so they fail the pr-policy
# Verification/Closes-N requirements. This workflow runs ONCE when a bot
# opens a non-doc PR and prepends a minimal scaffold. The scaffold is
# intentionally invalid until the agent records real verification.
# Human PRs are untouched.

on:
  workflow_call:
    inputs:
      doc-only-extensions:
        type: string
        default: "md|txt|png|jpg|jpeg|gif|svg|webp|bmp|ico|avif"
      doc-only-path-prefixes:
        type: string
        default: |
          .changelog/
      bot-logins:
        description: "Comma-separated list of bot logins to auto-inject for. Logins ending in [bot] always match."
        type: string
        default: "Copilot,copilot-swe-agent"

jobs:
  inject:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v9
        env:
          DOC_EXT_LIST: ${{ inputs.doc-only-extensions }}
          DOC_PREFIXES: ${{ inputs.doc-only-path-prefixes }}
          BOT_LOGINS: ${{ inputs.bot-logins }}
        with:
          script: |
            const pr = context.payload.pull_request;

            const explicitBots = process.env.BOT_LOGINS.split(',').map((s) => s.trim()).filter(Boolean);
            const login = pr.user.login;
            const isBot = explicitBots.includes(login) || login.endsWith('[bot]');
            if (!isBot) {
              core.info(`PR author ${login} is not a bot; auto-inject skipped.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const docExtRe = new RegExp(`\\.(${process.env.DOC_EXT_LIST})$`, 'i');
            const prefixes = process.env.DOC_PREFIXES.split('\n').map((s) => s.trim()).filter(Boolean);
            const isDoc = (p) => docExtRe.test(p) || prefixes.some((pre) => p.startsWith(pre));
            if (files.length > 0 && files.every((f) => isDoc(f.filename))) {
              core.info('Doc-only PR; auto-inject skipped.');
              return;
            }

            const body = pr.body || '';
            const has = {
              closes: /(Closes|Fixes|Refs)\s+#\d+/i.test(body),
              vHead: /##\s+Verification/i.test(body),
              vNotes: /###\s+Verification Notes/i.test(body),
              checked: /-\s+\[[xX]\]/.test(body),
            };
            if (has.closes && has.vHead && has.vNotes && has.checked) {
              core.info('Body already satisfies pr-policy; no injection.');
              return;
            }

            const branchDigits = pr.head.ref.match(/(\d{2,})/);
            const issueRef = branchDigits ? `#${branchDigits[1]}` : '# <set-before-merge>';

            const stub = [
              '<!-- AUTO-INJECTED policy stub for bot-authored PR. Replace freely. -->',
              '',
              '## Summary',
              '',
              'TODO: Fill in summary.',
              '',
              '## Verification',
              '',
              '- [ ] TODO: Run required verification and replace this line.',
              '',
              '### Verification Notes',
              '',
              'TODO: Replace this scaffold with concrete command output, CI check names, or manual smoke-test notes.',
              '',
              '## Docs / Changelog',
              '',
              'TODO: Record docs/changelog handling.',
              '',
              '## Linked Issue',
              '',
              `TODO: Closes ${issueRef}`,
              '',
              '---',
              '',
            ].join('\n');

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: stub + body,
            });
            core.info(`Auto-injected pr-policy stub into PR #${pr.number}.`);
