name: Anomaly to Issue (reusable)

# When a PR merges into the default branch and the merged diff `added` any
# file under the configured anomalies directory, this workflow creates one
# GitHub issue per added file and comments on the merged PR linking to the
# new issue(s).
#
# Each anomaly file must have YAML frontmatter:
#
#   ---
#   title: Short imperative title
#   severity: low|medium|high|critical
#   labels: ["optional", "extra", "labels"]
#   ---
#
#   Body markdown describing the anomaly.

on:
  workflow_call:
    inputs:
      anomaly-dir:
        description: "Directory holding anomaly files (with trailing slash)."
        type: string
        default: ".anomalies/"
      readme-filename:
        description: "Filename inside the anomaly dir to ignore (the README)."
        type: string
        default: "README.md"
      base-label:
        description: "Label applied to every promoted issue."
        type: string
        default: "anomaly"

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: actions/github-script@v9
        env:
          ANOMALY_DIR: ${{ inputs.anomaly-dir }}
          README_NAME: ${{ inputs.readme-filename }}
          BASE_LABEL: ${{ inputs.base-label }}
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const dir = process.env.ANOMALY_DIR;
            const ignore = dir + process.env.README_NAME;
            const baseLabel = process.env.BASE_LABEL;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const added = files.filter(
              (f) =>
                f.status === 'added' &&
                f.filename.startsWith(dir) &&
                f.filename.endsWith('.md') &&
                f.filename !== ignore,
            );

            if (added.length === 0) {
              core.info(`No new ${dir}*.md files in this merged PR.`);
              return;
            }

            function parseFrontmatter(raw) {
              const m = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
              if (!m) throw new Error('missing or malformed frontmatter block');
              const [, fm, body] = m;
              const out = { title: null, severity: 'medium', labels: [] };
              for (const line of fm.split(/\r?\n/)) {
                if (!line.trim() || line.trim().startsWith('#')) continue;
                const kv = line.match(/^([A-Za-z_]+)\s*:\s*(.*)$/);
                if (!kv) continue;
                const key = kv[1];
                let val = kv[2].trim();
                if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                else if (val.startsWith("'") && val.endsWith("'")) val = val.slice(1, -1);
                if (key === 'title') out.title = val;
                else if (key === 'severity') out.severity = val.toLowerCase();
                else if (key === 'labels') {
                  const arr = val.match(/^\[(.*)\]$/);
                  if (arr) {
                    out.labels = arr[1]
                      .split(',')
                      .map((s) => s.trim().replace(/^["']|["']$/g, ''))
                      .filter(Boolean);
                  }
                }
              }
              if (!out.title) throw new Error('frontmatter missing required `title`');
              const validSev = ['low', 'medium', 'high', 'critical'];
              if (!validSev.includes(out.severity)) {
                throw new Error(`invalid severity \`${out.severity}\` (expected one of ${validSev.join('/')})`);
              }
              return { ...out, body: body.trim() };
            }

            const created = [];
            const failed = [];

            for (const f of added) {
              try {
                const raw = fs.readFileSync(f.filename, 'utf8');
                const parsed = parseFrontmatter(raw);
                const labels = Array.from(
                  new Set([baseLabel, `severity:${parsed.severity}`, ...parsed.labels]),
                );
                const issueBody = [
                  parsed.body,
                  '',
                  '---',
                  `Auto-promoted from [\`${f.filename}\`](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${pr.merge_commit_sha}/${f.filename}) by reusable workflow \`anomaly-to-issue\` on merge of #${pr.number}.`,
                ].join('\n');

                const sevLabel = `severity:${parsed.severity}`;
                try {
                  await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: sevLabel });
                } catch (e) {
                  if (e.status === 404) {
                    const sevColor = { low: '0E8A16', medium: 'FBCA04', high: 'D93F0B', critical: 'B60205' }[parsed.severity];
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: sevLabel,
                      color: sevColor,
                      description: `Anomaly severity: ${parsed.severity}`,
                    });
                  } else {
                    throw e;
                  }
                }

                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: parsed.title,
                  body: issueBody,
                  labels,
                });
                created.push({ file: f.filename, issue: issue.number, url: issue.html_url });
                core.info(`Created #${issue.number} from ${f.filename}`);
              } catch (err) {
                failed.push({ file: f.filename, error: err.message });
                core.error(`Failed to promote ${f.filename}: ${err.message}`);
              }
            }

            const lines = [];
            if (created.length > 0) {
              lines.push(`Promoted ${created.length} anomaly file${created.length === 1 ? '' : 's'} to issue${created.length === 1 ? '' : 's'}:`);
              for (const c of created) lines.push(`- \`${c.file}\` → #${c.issue}`);
            }
            if (failed.length > 0) {
              if (lines.length > 0) lines.push('');
              lines.push(`Failed to promote ${failed.length} file${failed.length === 1 ? '' : 's'}:`);
              for (const f of failed) lines.push(`- \`${f.file}\`: ${f.error}`);
            }
            if (lines.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: lines.join('\n'),
              });
            }

            if (failed.length > 0) {
              core.setFailed(`${failed.length} anomaly file(s) failed to promote; see PR comment.`);
            }
