name: CodeQL (reusable)

# GitHub's native semantic code analysis. Finds real bugs and security issues
# in JavaScript/TypeScript, Python, Go, Java, C/C++, Ruby, Swift, and more.
# Free for public repos. Results show in the repo's Security tab.
#
# This wrapper pins the action versions and sets the standard query suite.
# Consumers pick the language(s) and trigger frequency.

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages, e.g. `["javascript-typescript","python"]`. Valid values: actions, c-cpp, csharp, go, java-kotlin, javascript-typescript, python, ruby, rust, swift.'
        type: string
        required: true
      queries:
        description: "CodeQL query suite. `default` (security-and-quality light), `security-extended`, or `security-and-quality`."
        type: string
        default: "security-and-quality"
      build-mode:
        description: "Build mode: `none` (interpreted languages), `autobuild`, or `manual`. Most repos want `none`."
        type: string
        default: "none"
      paths-ignore:
        description: "Newline-separated paths to exclude from scanning."
        type: string
        default: |
          **/__tests__/**
          **/*.test.*
          **/*.spec.*
          dist/**
          build/**
          node_modules/**

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries }}
          build-mode: ${{ inputs.build-mode }}
          paths-ignore: ${{ inputs.paths-ignore }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
