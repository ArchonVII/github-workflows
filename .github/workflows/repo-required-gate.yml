name: Repo Required Gate (reusable)

# Single required branch-protection surface for consumer repos. Consumers
# require only `repo-required-gate / decision`. Per-lane jobs remain
# conditional under that umbrella — never promote them to required (would
# trap mergeability on path-skipped runs). See Iridescent-Church plan
# (2026-05-20) Guardrail #1.
#
# The detect job classifies the PR into ONE of these lanes:
#   docs-only, workflow-only, policy-only, snapshot-refresh,
#   code (node|python|polyglot: node|python|node+python),
#   forced-full (label: ci:full)
# and gates downstream jobs accordingly. Classification logic lives in
# scripts/classify-pr.mjs and is checked out from this repo via the
# `workflow-library-ref` input (same pattern as pr-policy.yml).
#
# Lane is also surfaced as a one-line core.notice + a step-summary block
# so the PR's Actions view shows WHY a small PR didn't run everything
# (Guardrail #5).

on:
  workflow_call:
    inputs:
      stack:
        description: "Project stack: node, python, minimal, or polyglot."
        type: string
        default: "minimal"
      working-directory:
        description: "Subdirectory for language CI."
        type: string
        default: "."
      node-versions:
        description: "JSON array of Node versions for Node CI."
        type: string
        default: '["22"]'
      python-versions:
        description: "JSON array of Python versions for Python CI."
        type: string
        default: '["3.12"]'
      os-matrix:
        description: "JSON array of OS runners for language CI."
        type: string
        default: '["ubuntu-latest"]'
      branch-pattern:
        description: "Regex for allowed PR head branch names."
        type: string
        default: '^(agent|feat|fix|chore|docs|ci|test|refactor|perf|release|dependabot)\/[A-Za-z0-9._\/-]+$'
      require-linked-issue:
        type: boolean
        default: true
      require-verification-section:
        type: boolean
        default: true
      require-checked-box:
        type: boolean
        default: true
      run-pr-contract:
        type: boolean
        default: true
      run-dependency-review:
        type: boolean
        default: true
      run-workflow-validation:
        type: boolean
        default: true
      run-policy-validation:
        type: boolean
        default: true
      npm-lint-script:
        type: string
        default: "lint"
      npm-typecheck-script:
        type: string
        default: "typecheck"
      npm-test-script:
        type: string
        default: "test"
      npm-build-script:
        type: string
        default: ""
      pnpm-version:
        type: string
        default: "10"
      python-use-uv:
        type: boolean
        default: true
      python-lint-command:
        type: string
        default: "ruff check ."
      python-format-check-command:
        type: string
        default: "ruff format --check ."
      python-typecheck-command:
        type: string
        default: "pyright"
      python-test-command:
        type: string
        default: "pytest"
      # ---- New inputs (Iridescent-Church 2026-05-20) -----------------------
      node-paths:
        description: |
          Newline-separated patterns selecting Node-owned workspace roots.
          Required when stack=polyglot (unless python-paths is set). Patterns
          end in `/**` for prefix match, `/` for prefix match, or an exact
          filename. Empty for non-polyglot stacks.
        type: string
        default: ""
      python-paths:
        description: |
          Newline-separated patterns selecting Python-owned workspace roots.
          Same syntax as node-paths. Required when stack=polyglot (unless
          node-paths is set).
        type: string
        default: ""
      snapshot-paths:
        description: |
          Newline-separated patterns identifying snapshot files. When EVERY
          changed file matches, the PR routes to the snapshot-refresh lane
          and skips language CI. Empty disables the lane. (Guardrail #3: ALL
          files must match, not any.)
        type: string
        default: ""
      snapshot-test-command:
        description: |
          Shell command run by the snapshot-validation job when snapshot-only
          fires. Empty = the snapshot-refresh lane skips validation
          entirely (lane still reports for visibility).
        type: string
        default: ""
      force-full-ci-label:
        description: |
          PR label name that forces full language CI regardless of path
          routing. Release-Admiral's escape hatch when a workflow-only PR
          could still break CI semantically (Guardrail #2). Match is
          case-insensitive.
        type: string
        default: "ci:full"
      workflow-library-ref:
        description: |
          Git ref (tag, branch, or SHA) of ArchonVII/github-workflows used
          to source scripts/classify-pr.mjs. MUST match the ref the caller
          pins this reusable workflow to. Defaults to v1.
        type: string
        default: v1

jobs:
  detect:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      ok: ${{ steps.detect.outputs.ok }}
      lane: ${{ steps.detect.outputs.lane }}
      docs-only: ${{ steps.detect.outputs.docs-only }}
      run-ci: ${{ steps.detect.outputs.run-ci }}
      run-node-ci: ${{ steps.detect.outputs.run-node-ci }}
      run-python-ci: ${{ steps.detect.outputs.run-python-ci }}
      run-dependency-review: ${{ steps.detect.outputs.run-dependency-review }}
      run-workflow-validation: ${{ steps.detect.outputs.run-workflow-validation }}
      run-policy-validation: ${{ steps.detect.outputs.run-policy-validation }}
      snapshot-only: ${{ steps.detect.outputs.snapshot-only }}
      run-snapshot-validation: ${{ steps.detect.outputs.run-snapshot-validation }}
      forced-full: ${{ steps.detect.outputs.forced-full }}
      files-summary: ${{ steps.detect.outputs.files-summary }}
    steps:
      # Check out THIS reusable workflow's repo so we can dynamic-import
      # scripts/classify-pr.mjs. Mirrors pr-policy.yml's parser-checkout
      # pattern. Pin to the same ref the caller pins us at via
      # `workflow-library-ref` (default v1) so parser+workflow are versioned
      # together.
      - name: Check out github-workflows for classifier script
        uses: actions/checkout@v4
        with:
          repository: ArchonVII/github-workflows
          ref: ${{ inputs.workflow-library-ref }}
          path: __github-workflows__

      - name: Classify changed files
        id: detect
        uses: actions/github-script@v7
        env:
          STACK: ${{ inputs.stack }}
          NODE_PATHS: ${{ inputs.node-paths }}
          PYTHON_PATHS: ${{ inputs.python-paths }}
          SNAPSHOT_PATHS: ${{ inputs.snapshot-paths }}
          SNAPSHOT_TEST_COMMAND: ${{ inputs.snapshot-test-command }}
          FORCE_FULL_CI_LABEL: ${{ inputs.force-full-ci-label }}
          WORKFLOW_LIBRARY_REF: ${{ inputs.workflow-library-ref }}
        with:
          script: |
            const path = require('path');
            const url = require('url');

            const classifierPath = path.resolve(
              process.env.GITHUB_WORKSPACE,
              '__github-workflows__/scripts/classify-pr.mjs',
            );
            const ref = process.env.WORKFLOW_LIBRARY_REF || '(unset)';

            let classifyPR;
            try {
              ({ classifyPR } = await import(url.pathToFileURL(classifierPath).href));
            } catch (err) {
              const msg = `Could not load classifier at ${classifierPath} (workflow-library-ref=${ref}): ${err && err.message ? err.message : err}.`;
              core.setFailed(msg);
              return;
            }

            const pr = context.payload.pull_request;
            const isPullRequest = !!pr;

            let files = [];
            let labels = [];
            if (isPullRequest) {
              const filesPaged = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              files = filesPaged.map((f) => f.filename);
              labels = (pr.labels || []).map((l) => l.name);
            }

            const result = classifyPR({
              files,
              labels,
              stack: process.env.STACK,
              nodePaths: process.env.NODE_PATHS,
              pythonPaths: process.env.PYTHON_PATHS,
              snapshotPaths: process.env.SNAPSHOT_PATHS,
              snapshotTestCommand: process.env.SNAPSHOT_TEST_COMMAND,
              forceFullCiLabel: process.env.FORCE_FULL_CI_LABEL,
              isPullRequest,
            });

            // Emit ok + every output for downstream jobs.
            core.setOutput('ok', String(result.ok));
            core.setOutput('lane', result.lane);
            core.setOutput('docs-only', String(result.outputs.docsOnly));
            core.setOutput('run-ci', String(result.outputs.runCi));
            core.setOutput('run-node-ci', String(result.outputs.runNodeCi));
            core.setOutput('run-python-ci', String(result.outputs.runPythonCi));
            core.setOutput('run-dependency-review', String(result.outputs.runDependencyReview));
            core.setOutput('run-workflow-validation', String(result.outputs.runWorkflowValidation));
            core.setOutput('run-policy-validation', String(result.outputs.runPolicyValidation));
            core.setOutput('snapshot-only', String(result.outputs.snapshotOnly));
            core.setOutput('run-snapshot-validation', String(result.outputs.runSnapshotValidation));
            core.setOutput('forced-full', String(result.outputs.forcedFull));
            core.setOutput('files-summary', result.filesSummary);

            // Lane summary block: shows up in the Actions UI summary AND as
            // a one-line core.notice so the lane label appears in the list
            // view, not only inside the run (Guardrail #5).
            core.notice(`Lane: ${result.lane}`, { title: 'repo-required-gate' });

            const changedBlock = files.length > 0
              ? files.slice(0, 30).map((f) => `  - ${f}`).join('\n')
              : '  (no files / non-PR event)';
            const requiredBlock = result.jobsRequired.map((j) => `  - ${j}`).join('\n');
            const skippedBlock = result.jobsSkipped.length > 0
              ? result.jobsSkipped.map((j) => `  - ${j}`).join('\n')
              : '  (none)';

            await core.summary
              .addHeading('Repo Required Gate — lane decision', 3)
              .addCodeBlock(
                [
                  `Lane: ${result.lane}`,
                  '',
                  'Changed files:',
                  changedBlock,
                  '',
                  'Jobs required:',
                  requiredBlock,
                  '',
                  'Jobs skipped:',
                  skippedBlock,
                ].join('\n'),
                'text',
              )
              .write();

            // Fail fast on classifier config errors (e.g. stack=polyglot with
            // empty node-paths AND python-paths, or stack=minimal+code).
            if (!result.ok) {
              core.setFailed(result.errors.join('\n'));
            }

  pr-contract:
    name: pr contract
    needs: detect
    if: inputs.run-pr-contract && github.event_name == 'pull_request' && needs.detect.outputs.ok == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Enforce PR policy
        uses: actions/github-script@v7
        env:
          DOCS_ONLY: ${{ needs.detect.outputs.docs-only }}
          BRANCH_PATTERN: ${{ inputs.branch-pattern }}
          REQUIRE_LINKED_ISSUE: ${{ inputs.require-linked-issue }}
          REQUIRE_VERIFICATION_SECTION: ${{ inputs.require-verification-section }}
          REQUIRE_CHECKED_BOX: ${{ inputs.require-checked-box }}
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.draft) {
              core.info('Draft PR; pr contract is advisory until ready_for_review.');
              return;
            }

            const failures = [];
            const branch = pr.head.ref || '';
            const branchRe = new RegExp(process.env.BRANCH_PATTERN);
            if (!branchRe.test(branch)) {
              failures.push(`Head branch \`${branch}\` does not match required pattern.`);
            }

            if (!/^(feat|fix|refactor|test|docs|style|chore|perf|ci|build|revert)(\([^)]+\))?: .+/.test(pr.title || '')) {
              failures.push('PR title must use Conventional Commits format.');
            }

            const docsOnly = process.env.DOCS_ONLY === 'true';
            if (!docsOnly) {
              const body = pr.body || '';
              if (process.env.REQUIRE_LINKED_ISSUE === 'true' && !/(Closes|Fixes|Refs)\s+#\d+/i.test(body)) {
                failures.push('PR body must link an issue with `Closes #N`, `Fixes #N`, or `Refs #N`.');
              }
              if (process.env.REQUIRE_VERIFICATION_SECTION === 'true' && !(/##\s+Verification/i.test(body) && /###\s+Verification Notes/i.test(body))) {
                failures.push('PR body must include `## Verification` and `### Verification Notes` sections.');
              }
              if (process.env.REQUIRE_CHECKED_BOX === 'true' && !/-\s+\[[xX]\]/.test(body)) {
                failures.push('PR body must record completed verification with at least one checked checkbox.');
              }
            }

            if (failures.length) core.setFailed(failures.join('\n'));

  workflow-validation:
    name: workflow and hook validation
    needs: detect
    if: inputs.run-workflow-validation && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-workflow-validation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        if: ${{ hashFiles('.github/workflows/*.yml', '.github/workflows/*.yaml') != '' }}
        uses: raven-actions/actionlint@v2
        with:
          version: 1.7.7
          fail-on-error: true
      - name: Syntax-check git hooks
        shell: bash
        run: |
          if [ -d .githooks ]; then
            while IFS= read -r -d '' file; do
              case "$file" in
                *.sample) continue ;;
              esac
              first_line="$(head -n 1 "$file" || true)"
              if [[ "$first_line" == "#!"*sh* ]] || [[ "$file" == *.sh ]]; then
                bash -n "$file"
              fi
            done < <(find .githooks -type f -print0)
          fi

  policy-validation:
    name: policy validation
    needs: detect
    if: inputs.run-policy-validation && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-policy-validation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate check map
        shell: bash
        run: |
          if [ -f .agent/check-map.yml ]; then
            grep -Eq '^version: [0-9]+' .agent/check-map.yml
            grep -Eq '^required_gate:' .agent/check-map.yml
            grep -Eq '^[[:space:]]+check_name: repo-required-gate / decision' .agent/check-map.yml
          fi

  dependency-review:
    name: dependency review
    needs: detect
    if: inputs.run-dependency-review && github.event_name == 'pull_request' && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-dependency-review == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          fail-on-scopes: runtime
          comment-summary-in-pr: on-failure

  node-ci:
    name: node ci
    needs: detect
    if: needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-node-ci == 'true'
    uses: ArchonVII/github-workflows/.github/workflows/node-ci.yml@v1
    with:
      node-versions: ${{ inputs.node-versions }}
      os-matrix: ${{ inputs.os-matrix }}
      working-directory: ${{ inputs.working-directory }}
      lint-script: ${{ inputs.npm-lint-script }}
      typecheck-script: ${{ inputs.npm-typecheck-script }}
      test-script: ${{ inputs.npm-test-script }}
      build-script: ${{ inputs.npm-build-script }}
      pnpm-version: ${{ inputs.pnpm-version }}

  python-ci:
    name: python ci
    needs: detect
    if: needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-python-ci == 'true'
    uses: ArchonVII/github-workflows/.github/workflows/python-ci.yml@v1
    with:
      python-versions: ${{ inputs.python-versions }}
      os-matrix: ${{ inputs.os-matrix }}
      working-directory: ${{ inputs.working-directory }}
      use-uv: ${{ inputs.python-use-uv }}
      lint-command: ${{ inputs.python-lint-command }}
      format-check-command: ${{ inputs.python-format-check-command }}
      typecheck-command: ${{ inputs.python-typecheck-command }}
      test-command: ${{ inputs.python-test-command }}

  snapshot-validation:
    name: snapshot validation
    needs: detect
    if: needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-snapshot-validation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ fromJSON(inputs.node-versions)[0] }}

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          else
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        shell: bash
        run: ${{ steps.pm.outputs.install }}

      - name: Run snapshot test command
        shell: bash
        run: ${{ inputs.snapshot-test-command }}

  decision:
    name: decision
    needs:
      - detect
      - pr-contract
      - workflow-validation
      - policy-validation
      - dependency-review
      - node-ci
      - python-ci
      - snapshot-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide required gate
        shell: bash
        env:
          LANE: ${{ needs.detect.outputs.lane }}
          OK: ${{ needs.detect.outputs.ok }}
          RUN_NODE_CI: ${{ needs.detect.outputs.run-node-ci }}
          RUN_PYTHON_CI: ${{ needs.detect.outputs.run-python-ci }}
          RUN_DEPENDENCY_REVIEW: ${{ needs.detect.outputs.run-dependency-review }}
          RUN_WORKFLOW_VALIDATION: ${{ needs.detect.outputs.run-workflow-validation }}
          RUN_POLICY_VALIDATION: ${{ needs.detect.outputs.run-policy-validation }}
          RUN_SNAPSHOT_VALIDATION: ${{ needs.detect.outputs.run-snapshot-validation }}
          DETECT_RESULT: ${{ needs.detect.result }}
          CONTRACT_RESULT: ${{ needs.pr-contract.result }}
          WORKFLOW_RESULT: ${{ needs.workflow-validation.result }}
          POLICY_RESULT: ${{ needs.policy-validation.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
          NODE_RESULT: ${{ needs.node-ci.result }}
          PYTHON_RESULT: ${{ needs.python-ci.result }}
          SNAPSHOT_RESULT: ${{ needs.snapshot-validation.result }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_PR_CONTRACT: ${{ inputs.run-pr-contract }}
        run: |
          set -euo pipefail

          failed=0
          require_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name required but result was $result"
              failed=1
            fi
          }

          if [ "$OK" != "true" ]; then
            echo "::error::detect job classified the PR as a config error; see detect-job summary."
            failed=1
          fi

          require_success "detect changes" "$DETECT_RESULT"

          if [ "$RUN_PR_CONTRACT" = "true" ] && [ "$EVENT_NAME" = "pull_request" ]; then
            require_success "pr contract" "$CONTRACT_RESULT"
          fi

          if [ "$RUN_WORKFLOW_VALIDATION" = "true" ]; then
            require_success "workflow and hook validation" "$WORKFLOW_RESULT"
          fi

          if [ "$RUN_POLICY_VALIDATION" = "true" ]; then
            require_success "policy validation" "$POLICY_RESULT"
          fi

          if [ "$RUN_DEPENDENCY_REVIEW" = "true" ]; then
            require_success "dependency review" "$DEPENDENCY_RESULT"
          fi

          if [ "$RUN_NODE_CI" = "true" ]; then
            require_success "node ci" "$NODE_RESULT"
          fi

          if [ "$RUN_PYTHON_CI" = "true" ]; then
            require_success "python ci" "$PYTHON_RESULT"
          fi

          if [ "$RUN_SNAPSHOT_VALIDATION" = "true" ]; then
            require_success "snapshot validation" "$SNAPSHOT_RESULT"
          fi

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "repo-required-gate passed for lane: $LANE"
