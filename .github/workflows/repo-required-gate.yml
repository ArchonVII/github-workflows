name: Repo Required Gate (reusable)

# Single required branch-protection surface for consumer repos. Consumers
# require only `repo-required-gate / decision`. Per-lane jobs remain
# conditional under that umbrella — never promote them to required (would
# trap mergeability on path-skipped runs). See Iridescent-Church plan
# (2026-05-20) Guardrail #1.
#
# The detect job classifies the PR into ONE of these lanes:
#   docs-only, workflow-only, policy-only, snapshot-refresh,
#   code (node|python|polyglot: node|python|node+python),
#   forced-full (label: ci:full)
# and gates downstream jobs accordingly. Classification logic lives in
# scripts/classify-pr.mjs and is checked out from this repo via the
# `workflow-library-ref` input (same pattern as pr-policy.yml).
#
# Lane is also surfaced as a one-line core.notice + a step-summary block
# so the PR's Actions view shows WHY a small PR didn't run everything
# (Guardrail #5).

on:
  workflow_call:
    inputs:
      stack:
        description: "Project stack: node, python, minimal, or polyglot."
        type: string
        default: "minimal"
      working-directory:
        description: "Subdirectory for language CI."
        type: string
        default: "."
      node-versions:
        description: "JSON array of Node versions for Node CI."
        type: string
        default: '["22"]'
      python-versions:
        description: "JSON array of Python versions for Python CI."
        type: string
        default: '["3.12"]'
      os-matrix:
        description: "JSON array of OS runners for language CI."
        type: string
        default: '["ubuntu-latest"]'
      branch-pattern:
        description: "Regex for allowed PR head branch names."
        type: string
        default: '^(agent|feat|fix|chore|docs|ci|test|refactor|perf|release|dependabot)\/[A-Za-z0-9._\/-]+$'
      require-linked-issue:
        type: boolean
        default: true
      require-verification-section:
        type: boolean
        default: true
      require-checked-box:
        type: boolean
        default: true
      doc-only-extensions:
        description: "Pipe-separated extensions (no dots) considered doc-only for the PR contract."
        type: string
        default: "md|txt|png|jpg|jpeg|gif|svg|webp|bmp|ico|avif"
      doc-only-path-prefixes:
        description: "Newline-separated path prefixes also treated as doc-only for the PR contract."
        type: string
        default: |
          .changelog/
      run-pr-contract:
        type: boolean
        default: true
      pr-contract-exempt-bots:
        description: |
          Comma-separated GitHub login(s) whose PRs skip the body/title
          contract. The dependency/language CI, actionlint, and dependency
          review lanes still run and still gate merge via the decision job —
          only the human-authored body/title contract is skipped. Intended for
          dependabot, whose generated PR bodies structurally cannot satisfy the
          strict contract (no Summary/Verification/Closes-#N). Exact match on
          pr.user.login; default is dependabot only (NOT a blanket "[bot]"
          suffix) so arbitrary GitHub Apps are never auto-exempted. Empty
          string disables the exemption.
        type: string
        default: "dependabot[bot]"
      run-dependency-review:
        type: boolean
        default: true
      run-workflow-validation:
        type: boolean
        default: true
      run-policy-validation:
        type: boolean
        default: true
      npm-lint-script:
        type: string
        default: "lint"
      npm-typecheck-script:
        type: string
        default: "typecheck"
      npm-test-script:
        type: string
        default: "test"
      npm-build-script:
        type: string
        default: ""
      pnpm-version:
        type: string
        default: "10"
      python-use-uv:
        type: boolean
        default: true
      python-lint-command:
        type: string
        default: "ruff check ."
      python-format-check-command:
        type: string
        default: "ruff format --check ."
      python-typecheck-command:
        type: string
        default: "pyright"
      python-test-command:
        type: string
        default: "pytest"
      # ---- New inputs (Iridescent-Church 2026-05-20) -----------------------
      node-paths:
        description: |
          Newline-separated patterns selecting Node-owned workspace roots.
          Required when stack=polyglot (unless python-paths is set). Patterns
          end in `/**` for prefix match, `/` for prefix match, or an exact
          filename. Empty for non-polyglot stacks.
        type: string
        default: ""
      python-paths:
        description: |
          Newline-separated patterns selecting Python-owned workspace roots.
          Same syntax as node-paths. Required when stack=polyglot (unless
          node-paths is set).
        type: string
        default: ""
      snapshot-paths:
        description: |
          Newline-separated patterns identifying snapshot files. When EVERY
          changed file matches, the PR routes to the snapshot-refresh lane
          and skips language CI. Empty disables the lane. (Guardrail #3: ALL
          files must match, not any.)
        type: string
        default: ""
      snapshot-test-command:
        description: |
          Shell command run by the snapshot-validation job when snapshot-only
          fires. Empty = the snapshot-refresh lane skips validation
          entirely (lane still reports for visibility).
        type: string
        default: ""
      force-full-ci-label:
        description: |
          PR label name that forces full language CI regardless of path
          routing. Release-Admiral's escape hatch when a workflow-only PR
          could still break CI semantically (Guardrail #2). Match is
          case-insensitive.
        type: string
        default: "ci:full"
      # ---- Go lane (#51) ---------------------------------------------------
      go-versions:
        description: 'JSON array of Go versions for the Go lane, e.g. `["stable"]`.'
        type: string
        default: '["stable"]'
      go-paths:
        description: |
          Newline-separated patterns selecting Go-owned roots for a polyglot
          stack (same syntax as node-paths). For stack=polyglot, at least one
          of node-paths / python-paths / go-paths must be set. Ignored for
          non-polyglot stacks.
        type: string
        default: ""
      go-exclude-modules:
        description: "Newline-separated path prefixes whose go.mod roots the Go lane skips (e.g. `tsunami/demo/`)."
        type: string
        default: ""
      go-build-args:
        description: "Args for `go build` in the Go lane (word-split)."
        type: string
        default: "./..."
      go-test:
        description: "Run `go test` in the Go lane."
        type: boolean
        default: true
      go-test-args:
        description: "Args for `go test` in the Go lane (word-split)."
        type: string
        default: "./..."
      go-cgo-enabled:
        description: "CGO_ENABLED override for the Go lane (`0`/`1`). Empty = Go default."
        type: string
        default: ""
      go-setup-command:
        description: "Optional command run before Go verification (e.g. install Task)."
        type: string
        default: ""
      go-generate-command:
        description: "Optional codegen command run once before Go verification (e.g. `task generate`)."
        type: string
        default: ""
      go-verify-generated:
        description: "Fail if go-generate-command leaves a dirty tree (stale committed generated code)."
        type: boolean
        default: false
      workflow-library-ref:
        description: |
          Git ref (tag, branch, or SHA) of ArchonVII/github-workflows used
          to source scripts/classify-pr.mjs. MUST match the ref the caller
          pins this reusable workflow to. Defaults to v1.
        type: string
        default: v1

jobs:
  detect:
    name: detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      ok: ${{ steps.detect.outputs.ok }}
      lane: ${{ steps.detect.outputs.lane }}
      docs-only: ${{ steps.detect.outputs.docs-only }}
      run-ci: ${{ steps.detect.outputs.run-ci }}
      run-node-ci: ${{ steps.detect.outputs.run-node-ci }}
      run-python-ci: ${{ steps.detect.outputs.run-python-ci }}
      run-go-ci: ${{ steps.detect.outputs.run-go-ci }}
      run-dependency-review: ${{ steps.detect.outputs.run-dependency-review }}
      run-workflow-validation: ${{ steps.detect.outputs.run-workflow-validation }}
      run-policy-validation: ${{ steps.detect.outputs.run-policy-validation }}
      snapshot-only: ${{ steps.detect.outputs.snapshot-only }}
      run-snapshot-validation: ${{ steps.detect.outputs.run-snapshot-validation }}
      forced-full: ${{ steps.detect.outputs.forced-full }}
      files-summary: ${{ steps.detect.outputs.files-summary }}
    steps:
      # Check out THIS reusable workflow's repo so we can dynamic-import
      # scripts/classify-pr.mjs. Mirrors pr-policy.yml's parser-checkout
      # pattern. Pin to the same ref the caller pins us at via
      # `workflow-library-ref` (default v1) so parser+workflow are versioned
      # together.
      - name: Check out github-workflows for classifier script
        uses: actions/checkout@v7
        with:
          repository: ArchonVII/github-workflows
          ref: ${{ inputs.workflow-library-ref }}
          path: __github-workflows__

      - name: Classify changed files
        id: detect
        uses: actions/github-script@v9
        env:
          STACK: ${{ inputs.stack }}
          NODE_PATHS: ${{ inputs.node-paths }}
          PYTHON_PATHS: ${{ inputs.python-paths }}
          GO_PATHS: ${{ inputs.go-paths }}
          SNAPSHOT_PATHS: ${{ inputs.snapshot-paths }}
          SNAPSHOT_TEST_COMMAND: ${{ inputs.snapshot-test-command }}
          FORCE_FULL_CI_LABEL: ${{ inputs.force-full-ci-label }}
          WORKFLOW_LIBRARY_REF: ${{ inputs.workflow-library-ref }}
        with:
          script: |
            const path = require('path');
            const url = require('url');

            const classifierPath = path.resolve(
              process.env.GITHUB_WORKSPACE,
              '__github-workflows__/scripts/classify-pr.mjs',
            );
            const ref = process.env.WORKFLOW_LIBRARY_REF || '(unset)';

            let classifyPR;
            try {
              ({ classifyPR } = await import(url.pathToFileURL(classifierPath).href));
            } catch (err) {
              const msg = `Could not load classifier at ${classifierPath} (workflow-library-ref=${ref}): ${err && err.message ? err.message : err}.`;
              core.setFailed(msg);
              return;
            }

            const pr = context.payload.pull_request;
            const isPullRequest = !!pr;

            let files = [];
            let labels = [];
            if (isPullRequest) {
              const filesPaged = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              files = filesPaged.map((f) => f.filename);
              labels = (pr.labels || []).map((l) => l.name);
            }

            const result = classifyPR({
              files,
              labels,
              stack: process.env.STACK,
              nodePaths: process.env.NODE_PATHS,
              pythonPaths: process.env.PYTHON_PATHS,
              goPaths: process.env.GO_PATHS,
              snapshotPaths: process.env.SNAPSHOT_PATHS,
              snapshotTestCommand: process.env.SNAPSHOT_TEST_COMMAND,
              forceFullCiLabel: process.env.FORCE_FULL_CI_LABEL,
              isPullRequest,
            });

            // Emit ok + every output for downstream jobs.
            core.setOutput('ok', String(result.ok));
            core.setOutput('lane', result.lane);
            core.setOutput('docs-only', String(result.outputs.docsOnly));
            core.setOutput('run-ci', String(result.outputs.runCi));
            core.setOutput('run-node-ci', String(result.outputs.runNodeCi));
            core.setOutput('run-python-ci', String(result.outputs.runPythonCi));
            core.setOutput('run-go-ci', String(result.outputs.runGoCi));
            core.setOutput('run-dependency-review', String(result.outputs.runDependencyReview));
            core.setOutput('run-workflow-validation', String(result.outputs.runWorkflowValidation));
            core.setOutput('run-policy-validation', String(result.outputs.runPolicyValidation));
            core.setOutput('snapshot-only', String(result.outputs.snapshotOnly));
            core.setOutput('run-snapshot-validation', String(result.outputs.runSnapshotValidation));
            core.setOutput('forced-full', String(result.outputs.forcedFull));
            core.setOutput('files-summary', result.filesSummary);

            // Lane summary block: shows up in the Actions UI summary AND as
            // a one-line core.notice so the lane label appears in the list
            // view, not only inside the run (Guardrail #5).
            core.notice(`Lane: ${result.lane}`, { title: 'repo-required-gate' });

            const changedBlock = files.length > 0
              ? files.slice(0, 30).map((f) => `  - ${f}`).join('\n')
              : '  (no files / non-PR event)';
            const requiredBlock = result.jobsRequired.map((j) => `  - ${j}`).join('\n');
            const skippedBlock = result.jobsSkipped.length > 0
              ? result.jobsSkipped.map((j) => `  - ${j}`).join('\n')
              : '  (none)';

            await core.summary
              .addHeading('Repo Required Gate — lane decision', 3)
              .addCodeBlock(
                [
                  `Lane: ${result.lane}`,
                  '',
                  'Changed files:',
                  changedBlock,
                  '',
                  'Jobs required:',
                  requiredBlock,
                  '',
                  'Jobs skipped:',
                  skippedBlock,
                ].join('\n'),
                'text',
              )
              .write();

            // Fail fast on classifier config errors (e.g. stack=polyglot with
            // empty node-paths AND python-paths, or stack=minimal+code).
            if (!result.ok) {
              core.setFailed(result.errors.join('\n'));
            }

  pr-contract:
    name: pr contract
    needs: detect
    if: inputs.run-pr-contract && github.event_name == 'pull_request' && needs.detect.outputs.ok == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out github-workflows for PR contract validator
        uses: actions/checkout@v7
        with:
          repository: ArchonVII/github-workflows
          ref: ${{ inputs.workflow-library-ref }}
          path: __github-workflows__

      - name: Enforce PR policy
        uses: actions/github-script@v9
        env:
          BRANCH_PATTERN: ${{ inputs.branch-pattern }}
          REQUIRE_LINKED_ISSUE: ${{ inputs.require-linked-issue }}
          REQUIRE_VERIFICATION_SECTION: ${{ inputs.require-verification-section }}
          REQUIRE_CHECKED_BOX: ${{ inputs.require-checked-box }}
          DOC_EXT_LIST: ${{ inputs.doc-only-extensions }}
          DOC_PREFIXES: ${{ inputs.doc-only-path-prefixes }}
          WORKFLOW_LIBRARY_REF: ${{ inputs.workflow-library-ref }}
          PR_CONTRACT_EXEMPT_BOTS: ${{ inputs.pr-contract-exempt-bots }}
        with:
          script: |
            const path = require('path');
            const url = require('url');

            const pr = context.payload.pull_request;
            if (pr.draft) {
              core.info('Draft PR; pr contract is advisory until ready_for_review.');
              return;
            }

            // Exempt configured bot authors (default: dependabot) from the
            // human-authored body/title contract. Their generated PR bodies
            // can't satisfy it, but the dependency/CI lanes still run and the
            // decision job still gates merge. Exact login match only.
            const exemptBots = (process.env.PR_CONTRACT_EXEMPT_BOTS || '')
              .split(',')
              .map((s) => s.trim())
              .filter(Boolean);
            const author = (pr.user && pr.user.login) || '';
            if (exemptBots.includes(author)) {
              core.info(`PR author ${author} is contract-exempt (pr-contract-exempt-bots); body/title contract skipped. Dependency/CI lanes still gate merge.`);
              await core.summary
                .addHeading('PR contract skipped (exempt bot author)', 3)
                .addCodeBlock(`Author ${author} is in pr-contract-exempt-bots; the human-authored body/title contract is skipped. The dependency review / language CI lanes still run and still gate merge via the decision job.`, 'text')
                .write();
              return;
            }

            const validatorPath = path.resolve(
              process.env.GITHUB_WORKSPACE,
              '__github-workflows__/scripts/pr-contract.mjs',
            );
            const ref = process.env.WORKFLOW_LIBRARY_REF || '(unset)';

            let validatePrContract;
            let formatPrContractResult;
            try {
              ({ validatePrContract, formatPrContractResult } = await import(url.pathToFileURL(validatorPath).href));
            } catch (err) {
              const msg = `Could not load PR contract validator at ${validatorPath} (workflow-library-ref=${ref}): ${err && err.message ? err.message : err}.`;
              core.setFailed(msg);
              return;
            }

            const filesPaged = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const requireVerification = process.env.REQUIRE_VERIFICATION_SECTION === 'true';
            const result = validatePrContract({
              title: pr.title || '',
              body: pr.body || '',
              branch: pr.head.ref || '',
              files: filesPaged.map((file) => file.filename),
            }, {
              branchPattern: process.env.BRANCH_PATTERN,
              docOnlyExtensions: process.env.DOC_EXT_LIST,
              docOnlyPathPrefixes: process.env.DOC_PREFIXES,
              requireIssueLink: process.env.REQUIRE_LINKED_ISSUE === 'true',
              requiredHeadings: requireVerification ? undefined : [],
              requireSummary: requireVerification,
              requireDocsChangelog: requireVerification,
              requireSubstantiveVerificationNotes: requireVerification,
              rejectGenericVerificationNotes: requireVerification,
              requireCheckedVerification: process.env.REQUIRE_CHECKED_BOX === 'true',
              requireEvidenceBlocks: process.env.REQUIRE_CHECKED_BOX === 'true',
            });

            const report = formatPrContractResult(result);
            await core.summary
              .addHeading(result.ok ? 'PR contract passed' : 'PR contract failed', 3)
              .addCodeBlock(report, 'text')
              .write();

            if (!result.ok) {
              const marker = '<!-- archon-pr-contract -->';
              const repairBody = [
                marker,
                '',
                report,
                '',
                'Run locally:',
                '',
                '```bash',
                `npm run pr:contract -- --repo ${context.repo.owner}/${context.repo.repo} --pr ${pr.number}`,
                '```',
              ].join('\n');

              try {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  event: 'COMMENT',
                  body: repairBody,
                });
              } catch (err) {
                core.warning(`Could not post PR contract repair comment: ${err && err.message ? err.message : err}`);
              }

              core.setFailed(report);
            }

      # Warning-first guard against consumer PR-template drift. A repo's own
      # .github/PULL_REQUEST_TEMPLATE.md is copied at onboarding and tracked by
      # nothing afterward, so it silently rots out of sync with the strict
      # contract (e.g. pre-strict `## Changelog` instead of `## Docs / Changelog`,
      # or missing `### Verification Notes`). Filling such a template out
      # verbatim then fails the body check above with a confusing error. This
      # step surfaces the drift directly. Phase 1 = warning-only (never hard-
      # fails), matching the evidence parser. Source: /page-gm incident
      # 2026-06-07 (ArchonVII/hudson-bend#43; #53).
      - name: Warn if the repo PR template can't pass the contract
        if: ${{ !cancelled() && github.event.pull_request.draft == false }}
        uses: actions/github-script@v9
        env:
          WORKFLOW_LIBRARY_REF: ${{ inputs.workflow-library-ref }}
        with:
          script: |
            const path = require('path');
            const url = require('url');

            let templateBody = null;
            try {
              const resp = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/PULL_REQUEST_TEMPLATE.md',
                ref: context.payload.pull_request.base.ref,
              });
              templateBody = Buffer.from(resp.data.content, resp.data.encoding || 'base64').toString('utf8');
            } catch (err) {
              if (err && err.status === 404) {
                core.info('No .github/PULL_REQUEST_TEMPLATE.md; template conformance check skipped.');
                return;
              }
              core.warning(`Could not read PR template: ${err && err.message ? err.message : err}. Conformance check skipped.`);
              return;
            }

            const validatorPath = path.resolve(
              process.env.GITHUB_WORKSPACE,
              '__github-workflows__/scripts/pr-contract.mjs',
            );
            const ref = process.env.WORKFLOW_LIBRARY_REF || '(unset)';
            let validatePrTemplate;
            let formatPrTemplateResult;
            try {
              ({ validatePrTemplate, formatPrTemplateResult } = await import(url.pathToFileURL(validatorPath).href));
            } catch (err) {
              core.warning(`Could not load PR template validator at ${validatorPath} (workflow-library-ref=${ref}): ${err && err.message ? err.message : err}. Conformance check skipped.`);
              return;
            }

            const result = validatePrTemplate(templateBody);
            const report = formatPrTemplateResult(result);
            await core.summary
              .addHeading(result.ok ? 'PR template conformance' : 'PR template drift (warning)', 3)
              .addCodeBlock(report, 'text')
              .write();
            if (!result.ok) {
              core.warning(`pr-template: ${report}`);
            }

  # The validation/language lanes below are intentionally DECOUPLED from
  # pr-contract: they run on detect classification alone and are never gated on
  # contract success. A failing PR body must not suppress real CI. Coupling them
  # caused every lane to skip on a body failure, after which the decision job
  # reported a misleading "node ci ... required but result was skipped" while no
  # CI had actually run (ArchonVII/archon#200). The decision job still requires
  # BOTH the contract and the lanes, so a malformed body still blocks merge —
  # now with real lane signal instead of a phantom skip.
  workflow-validation:
    name: workflow and hook validation
    needs:
      - detect
    if: always() && inputs.run-workflow-validation && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-workflow-validation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Run actionlint
        if: ${{ hashFiles('.github/workflows/*.yml', '.github/workflows/*.yaml') != '' }}
        uses: raven-actions/actionlint@v2
        with:
          version: 1.7.7
          fail-on-error: true
      - name: Syntax-check git hooks
        shell: bash
        run: |
          if [ -d .githooks ]; then
            while IFS= read -r -d '' file; do
              case "$file" in
                *.sample) continue ;;
              esac
              first_line="$(head -n 1 "$file" || true)"
              if [[ "$first_line" == "#!"*sh* ]] || [[ "$file" == *.sh ]]; then
                bash -n "$file"
              fi
            done < <(find .githooks -type f -print0)
          fi

  policy-validation:
    name: policy validation
    needs:
      - detect
    if: always() && inputs.run-policy-validation && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-policy-validation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Validate check map
        shell: bash
        run: |
          if [ -f .agent/check-map.yml ]; then
            grep -Eq '^version: [0-9]+' .agent/check-map.yml
            grep -Eq '^required_gate:' .agent/check-map.yml
            grep -Eq '^[[:space:]]+check_name: repo-required-gate / decision' .agent/check-map.yml
          fi

  dependency-review:
    name: dependency review
    needs:
      - detect
    if: always() && inputs.run-dependency-review && github.event_name == 'pull_request' && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-dependency-review == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          fail-on-scopes: runtime
          comment-summary-in-pr: on-failure

  node-ci:
    name: node ci
    needs:
      - detect
    if: always() && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-node-ci == 'true'
    uses: ArchonVII/github-workflows/.github/workflows/node-ci.yml@v1
    with:
      node-versions: ${{ inputs.node-versions }}
      os-matrix: ${{ inputs.os-matrix }}
      working-directory: ${{ inputs.working-directory }}
      lint-script: ${{ inputs.npm-lint-script }}
      typecheck-script: ${{ inputs.npm-typecheck-script }}
      test-script: ${{ inputs.npm-test-script }}
      build-script: ${{ inputs.npm-build-script }}
      pnpm-version: ${{ inputs.pnpm-version }}

  python-ci:
    name: python ci
    needs:
      - detect
    if: always() && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-python-ci == 'true'
    uses: ArchonVII/github-workflows/.github/workflows/python-ci.yml@v1
    with:
      python-versions: ${{ inputs.python-versions }}
      os-matrix: ${{ inputs.os-matrix }}
      working-directory: ${{ inputs.working-directory }}
      use-uv: ${{ inputs.python-use-uv }}
      lint-command: ${{ inputs.python-lint-command }}
      format-check-command: ${{ inputs.python-format-check-command }}
      typecheck-command: ${{ inputs.python-typecheck-command }}
      test-command: ${{ inputs.python-test-command }}

  go-ci:
    name: go ci
    needs:
      - detect
    if: always() && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-go-ci == 'true'
    uses: ArchonVII/github-workflows/.github/workflows/go-ci.yml@v1
    with:
      go-versions: ${{ inputs.go-versions }}
      os-matrix: ${{ inputs.os-matrix }}
      exclude-modules: ${{ inputs.go-exclude-modules }}
      run-tests: ${{ inputs.go-test }}
      build-args: ${{ inputs.go-build-args }}
      test-args: ${{ inputs.go-test-args }}
      cgo-enabled: ${{ inputs.go-cgo-enabled }}
      setup-command: ${{ inputs.go-setup-command }}
      generate-command: ${{ inputs.go-generate-command }}
      verify-generated: ${{ inputs.go-verify-generated }}

  snapshot-validation:
    name: snapshot validation
    needs:
      - detect
    if: always() && needs.detect.outputs.ok == 'true' && needs.detect.outputs.run-snapshot-validation == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ fromJSON(inputs.node-versions)[0] }}

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          else
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Install
        shell: bash
        run: ${{ steps.pm.outputs.install }}

      - name: Run snapshot test command
        shell: bash
        run: ${{ inputs.snapshot-test-command }}

  decision:
    name: decision
    needs:
      - detect
      - pr-contract
      - workflow-validation
      - policy-validation
      - dependency-review
      - node-ci
      - python-ci
      - go-ci
      - snapshot-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide required gate
        shell: bash
        env:
          LANE: ${{ needs.detect.outputs.lane }}
          OK: ${{ needs.detect.outputs.ok }}
          RUN_NODE_CI: ${{ needs.detect.outputs.run-node-ci }}
          RUN_PYTHON_CI: ${{ needs.detect.outputs.run-python-ci }}
          RUN_GO_CI: ${{ needs.detect.outputs.run-go-ci }}
          RUN_DEPENDENCY_REVIEW: ${{ inputs.run-dependency-review && needs.detect.outputs.run-dependency-review == 'true' }}
          RUN_WORKFLOW_VALIDATION: ${{ inputs.run-workflow-validation && needs.detect.outputs.run-workflow-validation == 'true' }}
          RUN_POLICY_VALIDATION: ${{ inputs.run-policy-validation && needs.detect.outputs.run-policy-validation == 'true' }}
          RUN_SNAPSHOT_VALIDATION: ${{ needs.detect.outputs.run-snapshot-validation }}
          DETECT_RESULT: ${{ needs.detect.result }}
          CONTRACT_RESULT: ${{ needs.pr-contract.result }}
          WORKFLOW_RESULT: ${{ needs.workflow-validation.result }}
          POLICY_RESULT: ${{ needs.policy-validation.result }}
          DEPENDENCY_RESULT: ${{ needs.dependency-review.result }}
          NODE_RESULT: ${{ needs.node-ci.result }}
          PYTHON_RESULT: ${{ needs.python-ci.result }}
          GO_RESULT: ${{ needs.go-ci.result }}
          SNAPSHOT_RESULT: ${{ needs.snapshot-validation.result }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_PR_CONTRACT: ${{ inputs.run-pr-contract }}
        run: |
          set -euo pipefail

          failed=0
          require_success() {
            local name="$1"
            local result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::$name required but result was $result"
              failed=1
            fi
          }

          if [ "$OK" != "true" ]; then
            echo "::error::detect job classified the PR as a config error; see detect-job summary."
            failed=1
          fi

          require_success "detect changes" "$DETECT_RESULT"

          if [ "$RUN_PR_CONTRACT" = "true" ] && [ "$EVENT_NAME" = "pull_request" ]; then
            require_success "pr contract" "$CONTRACT_RESULT"
          fi

          if [ "$RUN_WORKFLOW_VALIDATION" = "true" ]; then
            require_success "workflow and hook validation" "$WORKFLOW_RESULT"
          fi

          if [ "$RUN_POLICY_VALIDATION" = "true" ]; then
            require_success "policy validation" "$POLICY_RESULT"
          fi

          if [ "$RUN_DEPENDENCY_REVIEW" = "true" ]; then
            require_success "dependency review" "$DEPENDENCY_RESULT"
          fi

          if [ "$RUN_NODE_CI" = "true" ]; then
            require_success "node ci" "$NODE_RESULT"
          fi

          if [ "$RUN_PYTHON_CI" = "true" ]; then
            require_success "python ci" "$PYTHON_RESULT"
          fi

          if [ "$RUN_GO_CI" = "true" ]; then
            require_success "go ci" "$GO_RESULT"
          fi

          if [ "$RUN_SNAPSHOT_VALIDATION" = "true" ]; then
            require_success "snapshot validation" "$SNAPSHOT_RESULT"
          fi

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "repo-required-gate passed for lane: $LANE"
