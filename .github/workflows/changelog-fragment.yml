name: Changelog Fragment (reusable)

# Enforces a per-PR CHANGELOG fragment convention. Any PR that touches the
# configured source-path prefix must add at least one new file under the
# configured fragment directory. PRs labeled with the opt-out label are
# exempt; doc-only PRs are also skipped automatically.

on:
  workflow_call:
    inputs:
      src-path-prefix:
        description: "PRs touching files under this prefix must add a fragment."
        type: string
        default: "src/"
      fragment-dir:
        description: "Directory where fragment files live (with trailing slash)."
        type: string
        default: ".changelog/unreleased/"
      opt-out-label:
        description: "PR label that skips the fragment requirement."
        type: string
        default: "no-changelog"
      doc-only-extensions:
        type: string
        default: "md|txt|png|jpg|jpeg|gif|svg|webp|bmp|ico|avif"
      doc-only-path-prefixes:
        type: string
        default: |
          .changelog/

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    steps:
      - uses: actions/github-script@v9
        env:
          SRC_PREFIX: ${{ inputs.src-path-prefix }}
          FRAGMENT_DIR: ${{ inputs.fragment-dir }}
          OPT_OUT_LABEL: ${{ inputs.opt-out-label }}
          DOC_EXT_LIST: ${{ inputs.doc-only-extensions }}
          DOC_PREFIXES: ${{ inputs.doc-only-path-prefixes }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const optOut = process.env.OPT_OUT_LABEL;
            const labels = (pr.labels || []).map((l) => l.name);
            if (labels.includes(optOut)) {
              core.info(`PR has \`${optOut}\` label; skipping fragment check.`);
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const docExtRe = new RegExp(`\\.(${process.env.DOC_EXT_LIST})$`, 'i');
            const prefixes = process.env.DOC_PREFIXES.split('\n').map((s) => s.trim()).filter(Boolean);
            const isDoc = (p) => docExtRe.test(p) || prefixes.some((pre) => p.startsWith(pre));
            if (files.length > 0 && files.every((f) => isDoc(f.filename))) {
              core.info('Doc-only PR; fragment check skipped.');
              return;
            }

            const srcPrefix = process.env.SRC_PREFIX;
            const touchesSrc = files.some((f) => f.filename.startsWith(srcPrefix) && f.status !== 'removed');
            if (!touchesSrc) {
              core.info(`PR does not touch ${srcPrefix}; fragment not required.`);
              return;
            }

            const fragmentDir = process.env.FRAGMENT_DIR;
            const addedFragment = files.some(
              (f) =>
                f.filename.startsWith(fragmentDir) &&
                f.filename.endsWith('.md') &&
                (f.status === 'added' || f.status === 'renamed'),
            );
            if (addedFragment) {
              core.info(`Found an added ${fragmentDir}*.md fragment.`);
              return;
            }

            core.setFailed(
              [
                `This PR touches \`${srcPrefix}\` but does not add a CHANGELOG fragment.`,
                '',
                `Add a file under \`${fragmentDir}\` (e.g. \`${fragmentDir}<issue>-<slug>.md\`).`,
                '',
                `If this PR genuinely does not warrant a CHANGELOG entry,`,
                `apply the \`${optOut}\` label to skip this check.`,
              ].join('\n'),
            );
