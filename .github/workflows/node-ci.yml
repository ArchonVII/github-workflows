name: Node CI (reusable)

# Generic lint + typecheck + test workflow for Node projects. Detects the
# package manager from the lockfile (npm / pnpm / yarn) and runs the
# corresponding install. Each step is opt-out via inputs so a TS-only repo
# can skip the test step, etc.
#
# Designed for the common case: single package.json at the repo root. For
# monorepos, run this reusable workflow once per workspace from the caller.

on:
  workflow_call:
    inputs:
      node-versions:
        description: 'JSON array of Node versions to test against, e.g. `["20","22"]`.'
        type: string
        default: '["22"]'
      os-matrix:
        description: 'JSON array of OS runners, e.g. `["ubuntu-latest"]` or `["ubuntu-latest","windows-latest","macos-latest"]`.'
        type: string
        default: '["ubuntu-latest"]'
      working-directory:
        description: "Subdirectory to run in. Useful for monorepo packages."
        type: string
        default: "."
      lint-script:
        description: "package.json script for lint. Empty string = skip."
        type: string
        default: "lint"
      typecheck-script:
        description: "package.json script for typecheck. Empty string = skip."
        type: string
        default: "typecheck"
      test-script:
        description: "package.json script for test. Empty string = skip."
        type: string
        default: "test"
      build-script:
        description: "package.json script for build. Empty string = skip."
        type: string
        default: ""
      install-command:
        description: "Override the install command. Empty = auto-detect from lockfile."
        type: string
        default: ""
      cache:
        description: "actions/setup-node cache: auto, npm, pnpm, yarn, or empty to disable."
        type: string
        default: "auto"
      pnpm-version:
        description: "pnpm version installed when pnpm-lock.yaml is detected."
        type: string
        default: "10"

jobs:
  ci:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJSON(inputs.node-versions) }}
        os: ${{ fromJSON(inputs.os-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          cache_input="${{ inputs.cache }}"
          lock_prefix=""
          if [ "${{ inputs.working-directory }}" != "." ]; then
            lock_prefix="${{ inputs.working-directory }}/"
          fi

          if [ -f pnpm-lock.yaml ]; then
            manager="pnpm"
            install="pnpm install --frozen-lockfile"
            run="pnpm run --if-present"
            default_cache="pnpm"
            cache_dependency_path="${lock_prefix}pnpm-lock.yaml"
          elif [ -f yarn.lock ]; then
            manager="yarn"
            install="yarn install --frozen-lockfile"
            run="yarn run"
            default_cache="yarn"
            cache_dependency_path="${lock_prefix}yarn.lock"
          elif [ -f package-lock.json ]; then
            manager="npm"
            install="npm ci"
            run="npm run --if-present"
            default_cache="npm"
            cache_dependency_path="${lock_prefix}package-lock.json"
          else
            manager="npm"
            install="npm ci"
            run="npm run --if-present"
            default_cache=""
            cache_dependency_path=""
          fi

          if [ -n "${{ inputs.install-command }}" ]; then
            install="${{ inputs.install-command }}"
          fi

          case "$cache_input" in
            auto)
              cache="$default_cache"
              ;;
            "")
              cache=""
              cache_dependency_path=""
              ;;
            npm|pnpm|yarn)
              cache="$cache_input"
              ;;
            *)
              echo "::error::cache input must be auto, npm, pnpm, yarn, or empty"
              exit 1
              ;;
          esac

          if [ -n "$cache" ] && [ "$cache" != "$default_cache" ]; then
            case "$cache" in
              npm)
                if [ -f package-lock.json ]; then
                  cache_dependency_path="${lock_prefix}package-lock.json"
                else
                  cache_dependency_path=""
                fi
                ;;
              pnpm)
                if [ -f pnpm-lock.yaml ]; then
                  cache_dependency_path="${lock_prefix}pnpm-lock.yaml"
                else
                  cache_dependency_path=""
                fi
                ;;
              yarn)
                if [ -f yarn.lock ]; then
                  cache_dependency_path="${lock_prefix}yarn.lock"
                else
                  cache_dependency_path=""
                fi
                ;;
            esac
          fi

          echo "manager=$manager" >> "$GITHUB_OUTPUT"
          echo "install=$install" >> "$GITHUB_OUTPUT"
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "cache=$cache" >> "$GITHUB_OUTPUT"
          echo "cache-dependency-path=$cache_dependency_path" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: ${{ steps.pm.outputs.cache }}
          cache-dependency-path: ${{ steps.pm.outputs.cache-dependency-path }}

      - name: Install
        shell: bash
        run: ${{ steps.pm.outputs.install }}

      - name: Lint
        if: inputs.lint-script != ''
        shell: bash
        run: ${{ steps.pm.outputs.run }} ${{ inputs.lint-script }}

      - name: Typecheck
        if: inputs.typecheck-script != ''
        shell: bash
        run: ${{ steps.pm.outputs.run }} ${{ inputs.typecheck-script }}

      - name: Test
        if: inputs.test-script != ''
        shell: bash
        run: ${{ steps.pm.outputs.run }} ${{ inputs.test-script }}

      - name: Build
        if: inputs.build-script != ''
        shell: bash
        run: ${{ steps.pm.outputs.run }} ${{ inputs.build-script }}
