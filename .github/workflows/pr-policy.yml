name: PR Policy (reusable)

# Reusable workflow that enforces a minimum PR body contract:
#   1. PR body links an issue (Closes / Fixes / Refs #N)
#   2. PR body contains a Verification heading
#   3. PR body contains a Verification Notes heading
#   4. At least one verification checkbox is checked (`- [x]`)
#
# Doc-only PRs (every changed file matches the doc filter) skip the ceremony.
# Draft PRs are advisory only.

on:
  workflow_call:
    inputs:
      require-linked-issue:
        description: "Require Closes/Fixes/Refs #N in the PR body."
        type: boolean
        default: true
      require-verification-section:
        description: "Require both Verification headings in the PR body."
        type: boolean
        default: true
      require-checked-box:
        description: "Require at least one `- [x]` checked box in the body."
        type: boolean
        default: true
      verification-section-heading:
        description: "H2 heading exact text (without the `## `)."
        type: string
        default: "Verification"
      verification-notes-heading:
        description: "H3 heading exact text (without the `### `)."
        type: string
        default: "Verification Notes"
      doc-only-extensions:
        description: "Pipe-separated extensions (no dots) considered doc-only."
        type: string
        default: "md|txt|png|jpg|jpeg|gif|svg|webp|bmp|ico|avif"
      doc-only-path-prefixes:
        description: "Newline-separated path prefixes also treated as doc-only."
        type: string
        default: |
          .changelog/
      run-actionlint:
        description: "Also run actionlint on the PR."
        type: boolean
        default: true
      enforce-evidence:
        description: |
          Phase 1 default is false: the F2/F10 evidence parser runs but only
          emits warnings to the job summary; malformed/missing evidence does
          NOT fail the workflow. Phase 2+ callers may opt in by setting this
          to true, in which case errors from scripts/parse-evidence.mjs hard-
          fail the job.
        type: boolean
        default: false
      workflow-library-ref:
        description: |
          Git ref (tag, branch, or SHA) of ArchonVII/github-workflows used to
          source scripts/parse-evidence.mjs. MUST match the ref the caller
          pins this reusable workflow to (e.g. @v1). Defaulting to v1 keeps
          parser+workflow versioned together; callers using @main or a SHA
          should pass workflow-library-ref to match. Source: PR #19 review
          patch 2 (2026-05-20).
        type: string
        default: v1

jobs:
  policy:
    runs-on: ubuntu-latest
    permissions:
      # `pull-requests: read` — read PR body, files, draft state.
      # `checks: read` — required by the evidence parser's `location: ci`
      #   handling, which calls `checks.listForRef` for the PR head SHA.
      # `contents: read` — required to fetch the head commit via
      #   `git.getCommit` for the parser's freshness/now comparison, and
      #   for `actions/checkout` of this workflow's repo for the parser
      #   script. When `permissions:` is declared, anything unlisted
      #   becomes `none` — so both must be explicit. Source: PR #19
      #   adversarial review (2026-05-20), finding C2.
      pull-requests: read
      checks: read
      contents: read
    steps:
      # Check out THIS reusable workflow's repo (ArchonVII/github-workflows)
      # into a sibling path so the evidence-check step can dynamic-import
      # scripts/parse-evidence.mjs. We deliberately don't check out the caller
      # repo here — the existing policy step uses the GitHub API and doesn't
      # need a working tree.
      #
      # Pin parser source to the same ref callers pin this reusable workflow
      # to. Defaulting to v1 keeps parser+workflow versioned together;
      # callers using @main or @sha should pass workflow-library-ref to
      # match. Without an explicit ref, actions/checkout would default to
      # the repository's default branch (main), creating "workflow from v1,
      # parser from main" drift.
      # Skip the parser checkout for draft PRs — the evidence-check step
      # early-returns for drafts (see the `pr.draft` block below) so the
      # parser is never invoked, and the ~5-10s clone is pure waste.
      #
      # We do NOT also skip for doc-only PRs at this stage: doc-only
      # detection requires `pulls.listFiles` (an API call) which can't
      # be evaluated at `if:`-expression time without a preceding step.
      # The doc-only short-circuit still fires inside the evidence step;
      # we just pay the checkout cost. Future refactor: an explicit
      # "classify PR" step that exports outputs for both subsequent
      # steps to gate on. Source: PR #19 adversarial review
      # (2026-05-20), finding M1.
      - name: Check out github-workflows for parser script
        if: github.event.pull_request.draft == false
        uses: actions/checkout@v4
        with:
          repository: ArchonVII/github-workflows
          ref: ${{ inputs.workflow-library-ref }}
          path: __github-workflows__

      - name: Enforce ready-for-review PR policy
        uses: actions/github-script@v7
        env:
          REQUIRE_LINKED_ISSUE: ${{ inputs.require-linked-issue }}
          REQUIRE_VERIFICATION_SECTION: ${{ inputs.require-verification-section }}
          REQUIRE_CHECKED_BOX: ${{ inputs.require-checked-box }}
          VERIFICATION_H2: ${{ inputs.verification-section-heading }}
          VERIFICATION_H3: ${{ inputs.verification-notes-heading }}
          DOC_EXT_LIST: ${{ inputs.doc-only-extensions }}
          DOC_PREFIXES: ${{ inputs.doc-only-path-prefixes }}
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.draft) {
              core.info('Draft PR; ready-for-review policy is advisory until draft is cleared.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const docExtRe = new RegExp(`\\.(${process.env.DOC_EXT_LIST})$`, 'i');
            const prefixes = process.env.DOC_PREFIXES
              .split('\n')
              .map((s) => s.trim())
              .filter(Boolean);
            const isDocFile = (p) => docExtRe.test(p) || prefixes.some((pre) => p.startsWith(pre));
            if (files.length > 0 && files.every((f) => isDocFile(f.filename))) {
              core.info(`Doc-only PR (${files.length} file${files.length === 1 ? '' : 's'}); verification ceremony skipped.`);
              return;
            }

            const body = pr.body || '';
            const failures = [];

            if (process.env.REQUIRE_LINKED_ISSUE === 'true') {
              if (!/(Closes|Fixes|Refs)\s+#\d+/i.test(body)) {
                failures.push('PR body must link an issue with `Closes #N`, `Fixes #N`, or `Refs #N`.');
              }
            }

            if (process.env.REQUIRE_VERIFICATION_SECTION === 'true') {
              const h2 = new RegExp(`##\\s+${process.env.VERIFICATION_H2}`, 'i');
              const h3 = new RegExp(`###\\s+${process.env.VERIFICATION_H3}`, 'i');
              if (!h2.test(body) || !h3.test(body)) {
                failures.push(`PR body must include \`## ${process.env.VERIFICATION_H2}\` and \`### ${process.env.VERIFICATION_H3}\` sections.`);
              }
            }

            if (process.env.REQUIRE_CHECKED_BOX === 'true') {
              if (!/-\s+\[[xX]\]/.test(body)) {
                failures.push('PR body must record completed verification with at least one checked checkbox.');
              }
            }

            if (failures.length > 0) {
              core.setFailed(failures.join('\n'));
            }

      # ----------------------------------------------------------------------
      # F2 + F10 evidence parser (amendment 2026-05-19).
      #
      # NOTE: Owner Maintenance Lane is direct-commit-only in Phase 1 and
      # never produces a PR, so it cannot reach this workflow. No PR-path
      # exemption for owner-maintenance is implemented here on purpose —
      # do NOT add a label/author check without a corresponding policy
      # update. The exemption lives upstream in the commit path.
      # ----------------------------------------------------------------------
      - name: Evidence check (warning-only by default)
        uses: actions/github-script@v7
        env:
          DOC_EXT_LIST: ${{ inputs.doc-only-extensions }}
          DOC_PREFIXES: ${{ inputs.doc-only-path-prefixes }}
          ENFORCE_EVIDENCE: ${{ inputs.enforce-evidence }}
          WORKFLOW_LIBRARY_REF: ${{ inputs.workflow-library-ref }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const summary = core.summary;

            if (pr.draft) {
              core.info('Draft PR; evidence parser is advisory.');
              await summary
                .addHeading('Evidence check (advisory)', 3)
                .addRaw('Draft PR — evidence parser skipped.')
                .write();
              return;
            }

            // Share the doc-only detection with the existing policy step.
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const docExtRe = new RegExp(`\\.(${process.env.DOC_EXT_LIST})$`, 'i');
            const prefixes = process.env.DOC_PREFIXES
              .split('\n')
              .map((s) => s.trim())
              .filter(Boolean);
            const isDocFile = (p) => docExtRe.test(p) || prefixes.some((pre) => p.startsWith(pre));
            if (files.length > 0 && files.every((f) => isDocFile(f.filename))) {
              core.info('Doc-only PR; evidence parser skipped.');
              await summary
                .addHeading('Evidence check', 3)
                .addRaw('Doc-only PR — evidence parser skipped.')
                .write();
              return;
            }

            // Fetch check-runs for the PR head SHA (parser authority for ci rows).
            const checkRunsResp = await github.paginate(
              github.rest.checks.listForRef,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100,
              },
            );
            const checkRuns = checkRunsResp.map((r) => ({
              name: r.name,
              completed_at: r.completed_at,
              conclusion: r.conclusion,
            }));

            // Head commit time. context.payload.pull_request only carries the
            // head SHA; fetch the commit to get its committer date.
            const headCommit = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: pr.head.sha,
            });
            const headCommitTime = headCommit.data.committer.date;

            // Dynamic-import the pure parser so this step has no module wiring.
            // Wrap the import in try/catch so a missing parser file (e.g.
            // checkout skipped, or workflow-library-ref points at a pre-parser
            // ref) degrades to a job-summary warning instead of an unhandled
            // step failure. Phase 1 is warning-only — even when
            // enforce-evidence is true, a missing parser is an ecosystem
            // config problem (wrong ref/permissions) not a PR-author
            // problem, so we still emit core.warning, never
            // core.setFailed. Source: PR #19 adversarial review
            // (2026-05-20), finding M2.
            const path = require('path');
            const url = require('url');
            const parserPath = path.resolve(
              process.env.GITHUB_WORKSPACE,
              '__github-workflows__/scripts/parse-evidence.mjs',
            );
            const workflowRef = process.env.WORKFLOW_LIBRARY_REF || '(unset)';
            let parseEvidence;
            try {
              ({ parseEvidence } = await import(url.pathToFileURL(parserPath).href));
            } catch (err) {
              const msg = `Could not load evidence parser at ${parserPath} (workflow-library-ref=${workflowRef}): ${err && err.message ? err.message : err}. Evidence check skipped.`;
              core.warning(msg);
              await summary
                .addHeading('Evidence check (skipped)', 3)
                .addRaw(msg)
                .write();
              return;
            }

            const result = parseEvidence(pr.body || '', {
              headCommitTime,
              now: new Date().toISOString(),
              checkRuns,
            });

            await summary.addHeading('Evidence check', 3).write();
            if (result.errors.length > 0) {
              await summary
                .addHeading('Errors', 4)
                .addList(result.errors)
                .write();
              for (const e of result.errors) core.warning(`evidence: ${e}`);
            }
            if (result.warnings.length > 0) {
              await summary
                .addHeading('Warnings', 4)
                .addList(result.warnings)
                .write();
              for (const w of result.warnings) core.warning(`evidence: ${w}`);
            }
            if (result.errors.length === 0 && result.warnings.length === 0) {
              await summary.addRaw('All checked verification items have well-formed evidence.').write();
            }

            if (process.env.ENFORCE_EVIDENCE === 'true' && result.errors.length > 0) {
              core.setFailed(`Evidence parser found ${result.errors.length} error(s).`);
            } else if (result.errors.length > 0) {
              core.info('enforce-evidence is false; reporting errors as warnings only.');
            }

  actionlint:
    if: inputs.run-actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          version: 1.7.7
          fail-on-error: true
